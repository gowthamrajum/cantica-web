# Render Blueprint — static hosting for the Telugu Community Church site.
# Setup: Render dashboard → New → Blueprint → connect gowthamrajum/cantica-web.
# Served at the domain root, so BASE_PATH is left unset (base = "/").
services:
  - type: web
    name: cantica-web
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: NODE_VERSION
        value: "22"
    routes:
      # SPA fallback: serve index.html for client-side routes
      # (/watch, /bible, /songs/:id, /c/:room …).
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      # Content-hashed assets (incl. the bundled Bible/Songs data-*.js) never change.
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
